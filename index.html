<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Sunny's kleiner Jingle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #000;
      color: #FFA500;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 1.6em; /* kleiner als vorher */
      margin-bottom: 20px; /* etwas weniger Abstand */
      white-space: nowrap;
      animation: rainbowText 5s ease-in-out infinite;
    }

    .emoji {
      display: inline-block;
      animation: glowRGB 3s linear infinite, dance 2s ease-in-out infinite;
    }

    @keyframes glowRGB {
      0%   { text-shadow: 0 0 8px red, 0 0 16px red; }
      16%  { text-shadow: 0 0 8px orange, 0 0 16px orange; }
      32%  { text-shadow: 0 0 8px yellow, 0 0 16px yellow; }
      48%  { text-shadow: 0 0 8px lime, 0 0 16px lime; }
      64%  { text-shadow: 0 0 8px cyan, 0 0 16px cyan; }
      80%  { text-shadow: 0 0 8px violet, 0 0 16px violet; }
      100% { text-shadow: 0 0 8px red, 0 0 16px red; }
    }

    @keyframes dance {
      0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
      25% { transform: translateY(-4px) rotate(-8deg) scale(1.05); }
      50% { transform: translateY(4px) rotate(8deg) scale(1.1); }
      75% { transform: translateY(-4px) rotate(-4deg) scale(1.05); }
    }

    button {
      font-size: 1em; /* kleiner */
      font-weight: bold;
      padding: 10px 25px; /* kleiner */
      background-color: #FFA500;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      max-width: 250px;
      transition: all 0.5s ease;
      box-shadow: 0 0 8px rgba(255, 165, 0, 0.8);
    }

    button:hover {
      animation: rainbow 5s ease-in-out infinite;
      box-shadow: 0 0 16px rgba(255, 165, 0, 1), 0 0 24px rgba(255, 165, 0, 1);
      transform: scale(1.05);
      color: #000;
    }

    @keyframes rainbowText {
      0% { color: #FF0000; }
      16% { color: #FF7F00; }
      32% { color: #FFFF00; }
      48% { color: #00FF00; }
      64% { color: #0000FF; }
      80% { color: #4B0082; }
      100% { color: #8B00FF; }
    }

    @keyframes rainbow {
      0% { background-color: #FF0000; }
      16% { background-color: #FF7F00; }
      32% { background-color: #FFFF00; }
      48% { background-color: #00FF00; }
      64% { background-color: #0000FF; }
      80% { background-color: #4B0082; }
      100% { background-color: #8B00FF; }
    }

    audio { display: none; }

    @media (max-width: 500px) {
      h1 { font-size: 1.3em; }
      button { font-size: 0.9em; padding: 8px 20px; }
    }
  </style>
</head>
<body>

  <h1>
    <span class="emoji">🎶</span>
    Sunny's kleiner Jingle
    <span class="emoji">🎶</span>
  </h1>

  <button id="playPauseBtn">🔊 Play Now</button>

  <audio id="audio">
    <source src="audio.aac" type="audio/aac">
  </audio>

  <script>
    const audio = document.getElementById('audio');
    const btn = document.getElementById('playPauseBtn');

    btn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
        btn.textContent = "⏸️ Pause";
      } else {
        audio.pause();
        btn.textContent = "🔊 Play Now";
      }
    });
  </script>

</body>
</html>
