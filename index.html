<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Sunny's Songs Playlist</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6em;
            margin-bottom: 10px;
            white-space: nowrap;
        }

        .category-container {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #ff7f00; /* Kategorie-Farbe */
        }

        .rgb-animated {
            animation: rainbowText 5s ease-in-out infinite;
        }

        .arrow {
            font-size: 1.3em;
            cursor: pointer;
            margin: 0 10px;
            transition: transform 0.2s ease;
        }

        .arrow:hover {
            transform: scale(1.3);
        }

        .emoji {
            display: inline-block;
            animation: glowRGB 3s linear infinite, dance 2s ease-in-out infinite;
            margin: 0 5px;
        }

        /* RGB Button Hintergrund */
        @keyframes rainbowBG {
            0%   { background-color: #FF0000; }
            16%  { background-color: #FF7F00; }
            32%  { background-color: #FFFF00; }
            48%  { background-color: #00FF00; }
            64%  { background-color: #0000FF; }
            80%  { background-color: #4B0082; }
            100% { background-color: #8B00FF; }
        }

        button {
            font-size: 1em;
            font-weight: bold;
            padding: 10px 25px;
            color: #000; /* Text schwarz */
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            max-width: 250px;
            transition: all 0.5s ease;
            background-color: #FFA500; /* Startfarbe */
            box-shadow: 0 0 8px rgba(255, 165, 0, 0.8);
        }

        button.rgb-bg {
            animation: rainbowBG 5s ease-in-out infinite;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 16px rgba(255, 165, 0, 1), 0 0 24px rgba(255, 165, 0, 1);
        }

        @keyframes glowRGB {
            0%   { text-shadow: 0 0 8px red, 0 0 16px red; }
            16%  { text-shadow: 0 0 8px orange, 0 0 16px orange; }
            32%  { text-shadow: 0 0 8px yellow, 0 0 16px yellow; }
            48%  { text-shadow: 0 0 8px lime, 0 0 16px lime; }
            64%  { text-shadow: 0 0 8px cyan, 0 0 16px cyan; }
            80%  { text-shadow: 0 0 8px violet, 0 0 16px violet; }
            100% { text-shadow: 0 0 8px red, 0 0 16px red; }
        }

        @keyframes dance {
            0%, 100%   { transform: translateY(0) rotate(0deg) scale(1); }
            25%        { transform: translateY(-4px) rotate(-8deg) scale(1.05); }
            50%        { transform: translateY(4px) rotate(8deg) scale(1.1); }
            75%        { transform: translateY(-4px) rotate(-4deg) scale(1.05); }
        }

        @keyframes rainbowText {
            0%   { color: #FF0000; }
            16%  { color: #FF7F00; }
            32%  { color: #FFFF00; }
            48%  { color: #00FF00; }
            64%  { color: #0000FF; }
            80%  { color: #4B0082; }
            100% { color: #8B00FF; }
        }

        @media (max-width: 500px) {
            .title-container { font-size: 1.3em; }
            .category-container { font-size: 1em; }
            .arrow { font-size: 1.1em; margin: 0 5px; }
            button { font-size: 0.9em; padding: 8px 20px; }
        }

        audio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="title-container">
        <span class="arrow rgb-animated" id="prev">⬅️</span>
        <span class="emoji">🎶</span>
        <span id="songTitle" class="rgb-animated">Sunny's Songs</span>
        <span class="emoji">🎶</span>
        <span class="arrow rgb-animated" id="next">➡️</span>
    </div>

    <div class="category-container" id="songCategory"></div>

    <!-- Button zunächst verstecken -->
    <button id="playPauseBtn" style="display: none;">🔊 Play Now</button>

    <audio id="audio"></audio>

    <script>
        const songs = [
            { title: "Der kleine Jingle", file: "Jingle.aac", category: "Sunny's Schätze" },
            { title: "Cha-La Head-Cha-La", file: "Cha-La Head-Cha-La.aac", category: "Dragonball Z" },
            { title: "Die Legende", file: "Die Legende.aac", category: "One Piece" },
            { title: "Leb deinen Traum", file: "Leb deinen Traum.aac", category: "Digimon" },
            { title: "Frei wie der Wind", file: "Frei wie der Wind.aac", category: "Monster Rancher" },
            { title: "Last Unicorn", file: "Last Unicorn.aac", category: "Das Letzte Einhorn" }
        ];

        let currentIndex = -1;
        const audio = document.getElementById('audio');
        const btn = document.getElementById('playPauseBtn');
        const songTitle = document.getElementById('songTitle');
        const songCategory = document.getElementById('songCategory');
        const prevBtn = document.getElementById('prev');
        const nextBtn = document.getElementById('next');

        function loadSong(index) {
            currentIndex = index;
            const song = songs[index];
            audio.src = song.file;
            songTitle.textContent = song.title;
            songCategory.textContent = song.category;
            audio.pause();

            // Button sichtbar machen, wenn ein Song geladen wird
            btn.style.display = "block";
            btn.disabled = false;
            btn.textContent = "🔊 Play Now";
            btn.classList.remove('rgb-bg'); // Button zurücksetzen
        }

        btn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                btn.textContent = "⏸️ Pause";
                btn.classList.add('rgb-bg'); // RGB-Animation startet beim ersten Klick
            } else {
                audio.pause();
                btn.textContent = "🔊 Play Now";
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentIndex === -1) {
                loadSong(songs.length - 1);
            } else {
                loadSong((currentIndex - 1 + songs.length) % songs.length);
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex === -1) {
                loadSong(0);
            } else {
                loadSong((currentIndex + 1) % songs.length);
            }
        });
    </script>
</body>
</html>
